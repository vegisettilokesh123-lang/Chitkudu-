<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f0a1a;
  color:white;
  overflow:hidden;
}

/* ENTRY SCREEN */
.center{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  position:relative;
}

/* BUTTONS */
button{
  padding:12px 20px;
  margin:10px;
  border-radius:20px;
  border:none;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

.yes,.no{
  background:#333;
  color:white;
}

.special{
  background:#bba6ff;
  color:#1a102b;
  font-weight:bold;
  box-shadow:0 0 15px rgba(187,166,255,0.6);
}

/* MAIN CONTENT */
#main{
  display:none;
  animation:fadeIn 1s ease forwards;
  overflow:auto;
  height:100vh;
}

@keyframes fadeIn{
  from{opacity:0; transform:scale(1.05);}
  to{opacity:1; transform:scale(1);}
}

/* SECTIONS */
.section{
  position:relative;
  height:90vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.section img{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(0.4);
}

/* PHOTO4 FULL */
.section:nth-of-type(4) img{
  object-fit:contain;
}

/* TEXT */
.text{
  position:absolute;
  top:40px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.4);
  padding:20px;
  border-radius:15px;
  max-width:600px;
  line-height:1.7;
  opacity:0;
  animation:fadeText 1s forwards;
}

@keyframes fadeText{
  to{opacity:1;}
}

/* SLIDER */
.slider{
  width:90%;
  max-width:400px;
  height:300px;
  position:relative;
  overflow:hidden;
  border-radius:15px;
}

.slider img{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  animation:slide 12s infinite;
}

.slider img:nth-child(1){animation-delay:0s;}
.slider img:nth-child(2){animation-delay:4s;}
.slider img:nth-child(3){animation-delay:8s;}

@keyframes slide{
  0%{opacity:0;}
  10%{opacity:1;}
  30%{opacity:1;}
  40%{opacity:0;}
  100%{opacity:0;}
}

/* CANVAS WORDS */
canvas{
  position:fixed;
  top:0;
  left:0;
  pointer-events:none;
}
</style>
</head>

<body>

<div class="center">
<h2>Is this chitkus? 😗</h2>

<!-- UPDATED BUTTON TEXT -->
<button class="yes" onclick="runAway(this)">Jhooth thonti 😂</button>
<button class="no" onclick="runAway(this)">Jhooth aaipedu 😜</button>

<button class="special" onclick="handleSpecial(this)">Meecckksss 😘✨</button>
</div>

<canvas id="canvas"></canvas>

<div id="main">

<div class="section">
<img src="photo1.png">
<div class="text">
To my chitkudu putkudu rani 😚❤️ <br><br>
Ooshili andhalu chusi chitkudu putkudu aaipothunna nenu ikkada
</div>
</div>

<div class="section">
<img src="photo2.jpg">
<div class="text">
Sorry chittudu 🥺
</div>
</div>

<div class="section">
<img src="photo3.jpg">
<div class="text">
Chala strong amma 🫂❤️
</div>
</div>

<div class="section">
<img src="photo4.jpg">
<div class="text">
Love you amma ❤️🤍
</div>
</div>

<div class="section">
<div class="text">mecks andhalu chudu 💜</div>

<div class="slider">
<img src="photo5.jpg">
<img src="photo6.jpg">
<img src="photo7.jpg">
</div>
</div>

<p style="text-align:center;opacity:0.7;">
Jlai khuad potato 😂😚🎂
</p>

</div>

<script>

function openSite(){
  document.querySelector('.center').style.display='none';
  document.getElementById('main').style.display='block';
}

function runAway(btn){
  btn.style.position="absolute";

  // keep inside screen properly
  btn.style.top=Math.random()*70+"%";
  btn.style.left=Math.random()*70+"%";
}

let count=0;
function handleSpecial(btn){
  if(count<3){
    runAway(btn);
    count++;
  }else{
    openSite();
  }
}

/* PHYSICS WORDS */
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let words=["chitkudu","gochi rani","budaga","muddu","kattu","ooshuli"];

let balls=words.map(w=>({
  text:w,
  x:Math.random()*canvas.width,
  y:Math.random()*canvas.height,
  dx:(Math.random()-0.5)*2,
  dy:(Math.random()-0.5)*2
}));

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.font="20px sans-serif";
  ctx.fillStyle="#caaaff";
  ctx.shadowBlur=15;
  ctx.shadowColor="#caaaff";

  balls.forEach(b=>{
    ctx.fillText(b.text,b.x,b.y);

    b.x+=b.dx;
    b.y+=b.dy;

    if(b.x<0||b.x>canvas.width) b.dx*=-1;
    if(b.y<0||b.y>canvas.height) b.dy*=-1;
  });

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
