<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f0a1a;
  color:white;
  overflow:hidden;
}

/* ENTRY SCREEN */
.center{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  position:relative;
}

/* BUTTONS */
button{
  padding:12px 20px;
  margin:10px;
  border-radius:20px;
  border:none;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

.yes,.no{
  background:#333;
  color:white;
}

.special{
  background:#bba6ff;
  color:#1a102b;
  font-weight:bold;
  box-shadow:0 0 15px rgba(187,166,255,0.6);
}

/* MAIN CONTENT */
#main{
  display:none;
  animation:fadeIn 1s ease forwards;
  overflow:auto;
  height:100vh;
}

@keyframes fadeIn{
  from{opacity:0; transform:scale(1.05);}
  to{opacity:1; transform:scale(1);}
}

/* SECTIONS */
.section{
  position:relative;
  height:90vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.section img{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(0.4);
}

/* PHOTO4 FULL */
.section:nth-of-type(4) img{
  object-fit:contain;
}

/* TEXT */
.text{
  position:absolute;
  top:40px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.4);
  padding:20px;
  border-radius:15px;
  max-width:600px;
  line-height:1.7;
  opacity:0;
  animation:fadeText 1s forwards;
}

@keyframes fadeText{
  to{opacity:1;}
}

/* SLIDER */
.slider{
  width:90%;
  max-width:400px;
  height:300px;
  position:relative;
  overflow:hidden;
  border-radius:15px;
}

.slider img{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  animation:slide 12s infinite;
}

.slider img:nth-child(1){animation-delay:0s;}
.slider img:nth-child(2){animation-delay:4s;}
.slider img:nth-child(3){animation-delay:8s;}

@keyframes slide{
  0%{opacity:0;}
  10%{opacity:1;}
  30%{opacity:1;}
  40%{opacity:0;}
  100%{opacity:0;}
}

/* MESSAGE */
#message{
  margin-top:20px;
  font-size:18px;
  text-align:center;
}
</style>
</head>

<body>

<!-- ENTRY SCREEN -->
<div class="center">
<h2>Is this chitkus? 😗</h2>

<button class="yes" onclick="showText('yes')">Jhooth thonti 😂</button>
<button class="no" onclick="showText('no')">Jhooth aaipedu 😜</button>

<button class="special" onclick="handleSpecial()">Meecckksss 😘✨</button>

<p id="message"></p>
</div>

<!-- MAIN -->
<div id="main">

<div class="section">
<img src="photo1.png">
<div class="text">
To my chitkudu putkudu rani 😚❤️
</div>
</div>

<div class="section">
<img src="photo2.jpg">
<div class="text">
Sorry chittudu 🥺
</div>
</div>

<div class="section">
<img src="photo3.jpg">
<div class="text">
You are strong 💜
</div>
</div>

<div class="section">
<img src="photo4.jpg">
<div class="text">
Love you amma ❤️🤍
</div>
</div>

<div class="section">
<div class="text">Mecks andhalu chudu 💜</div>

<div class="slider">
<img src="photo5.jpg">
<img src="photo6.jpg">
<img src="photo7.jpg">
</div>
</div>

<p style="text-align:center;opacity:0.7;">
Jlai khuad potato 😂😚🎂
</p>

</div>

<script>

/* YES / NO TEXT */
function showText(type){
  let msg = document.getElementById("message");

  if(type === "yes"){
    msg.innerHTML = "😄 I knew it! You said YES 💜";
  }
  else if(type === "no"){
    msg.innerHTML = "😜 Ayyoo! You said NO but still you matter ❤️";
  }
}

/* MECKS BUTTON */
let count = 0;

function handleSpecial(){
  let btn = document.querySelector(".special");

  if(count < 3){
    btn.style.position = "absolute";
    btn.style.top = Math.random()*70 + "%";
    btn.style.left = Math.random()*70 + "%";
    count++;
  } else {
    document.querySelector(".center").style.display = "none";
    document.getElementById("main").style.display = "block";
  }
}

</script>

</body>
</html>
